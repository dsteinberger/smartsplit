name: Bug Report
description: Report a bug in SmartSplit
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Start SmartSplit with `smartsplit --mode balanced`
        2. Send a request with `curl ...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste any relevant logs (run with `--log-level DEBUG`)
      render: shell
  - type: input
    id: version
    attributes:
      label: SmartSplit version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
  - type: input
    id: client
    attributes:
      label: Client used
      placeholder: "Continue, Cline, Aider, curl..."
