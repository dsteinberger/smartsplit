name: Provider Watch (Daily)

on:
  # Daily schedule disabled while repo is on standby — re-enable by uncommenting.
  # schedule:
  #   - cron: "0 8 * * *"
  workflow_dispatch: # Manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install httpx

      - name: Run provider watch
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          REPORT_OUTPUT: report.md
        run: python scripts/provider_watch.py

      - name: Check upstream safe tools
        run: |
          python scripts/check_safe_tools.py --markdown >> report.md || true

      - name: Check if report has action items
        id: check
        run: |
          result=$(python scripts/report_has_actions.py report.md)
          echo "has_actions=$result" >> $GITHUB_OUTPUT

      - name: Create GitHub issue
        if: steps.check.outputs.has_actions == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Provider Watch — $(date -u +%Y-%m-%d)"
          gh issue create \
            --title "$TITLE" \
            --body-file report.md \
            --label "provider-watch,automated"

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: provider-watch-report
          path: report.md
          retention-days: 30
