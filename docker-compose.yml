services:
  smartsplit:
    build: .
    image: smartsplit:latest
    ports:
      - "8420:8420"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8420/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
