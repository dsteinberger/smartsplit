services:
  # API mode — OpenAI-compatible endpoint (default)
  smartsplit:
    build: .
    image: smartsplit:latest
    ports:
      - "8420:8420"
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8420/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Proxy mode — HTTPS proxy for Claude Code / any agent
  # Usage: docker compose --profile proxy up -d proxy
  proxy:
    build: .
    image: smartsplit:latest
    command: ["--proxy", "--host", "0.0.0.0", "--port", "8420"]
    ports:
      - "8420:8420"
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ~/.smartsplit/certs:/certs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8420/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - proxy
